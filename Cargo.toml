[package]
name = "ripdiff"
version = "0.1.0"
edition = "2021"
default-run = "ripdiff"

[[bin]]
name = "ripdiff"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
notify = "6"
clap = { version = "4", features = ["derive"] }
ansi-to-tui = "8"
anyhow = "1"

[dev-dependencies]
tempfile = "3"
