[package]
name = "ripdiff"
version = "0.1.0"
edition = "2021"
default-run = "ripdiff"

[[bin]]
name = "ripdiff"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
notify = "6"
clap = { version = "4", features = ["derive"] }
ansi-to-tui = "7"
anyhow = "1"
unicode-width = "0.2"
tempfile = "3"
difftastic = { git = "https://github.com/martinabeleda/difftastic.git", rev = "008ffe865b1b1cf995abf86af456c8e5b44c8119" }

[dev-dependencies]
