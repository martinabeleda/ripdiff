[package]
name = "ripdiff"
version = "0.1.0"
edition = "2021"
default-run = "ripdiff"
description = "Terminal UI for navigating git diffs with optional difftastic integration"
license = "MIT"
repository = "https://github.com/martinabeleda/ripdiff"
readme = "README.md"
keywords = ["git", "diff", "tui", "terminal", "difftastic"]
categories = ["command-line-utilities", "development-tools"]
exclude = [".github/"]

[[bin]]
name = "ripdiff"
path = "src/main.rs"

[dependencies]
ratatui = "0.29"
crossterm = "0.28"
tokio = { version = "1", features = ["full"] }
notify = "6"
clap = { version = "4", features = ["derive"] }
ansi-to-tui = "7"
anyhow = "1"
unicode-width = "0.2"

[dev-dependencies]
tempfile = "3"
